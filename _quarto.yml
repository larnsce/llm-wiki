# Documentation website (docs/website.md documents this setup).
# Renders the existing markdown tree in place; the reference/ index pages
# and index.md are GENERATED by the pre-render script and gitignored.
project:
  type: website
  output-dir: _site
  pre-render: python3 tools/build_doc_indexes.py
  render:
    - index.md
    - CHANGELOG.md
    - CONTRIBUTING.md
    - reference/*.md
    - plain/*.md
    - docs/*.md
    - openspec/specs/*.md
    - skills/*/SKILL.md
    - skills/*/references/*.md
    - agents/*.md

website:
  title: llm-wiki
  site-url: https://larnsce.github.io/llm-wiki/
  repo-url: https://github.com/larnsce/llm-wiki
  repo-actions: [source, issue]
  page-navigation: true
  navbar:
    left:
      - text: Skills
        menu:
          - text: Standard (SKILL.md)
            href: reference/skills.md
          - text: In plain language
            href: reference/plain-language.md
      - text: Specs
        href: reference/specs.md
      - text: Agents
        href: reference/agents.md
      - text: Articles
        href: reference/articles.md
      - text: News
        href: CHANGELOG.md
    right:
      - icon: github
        href: https://github.com/larnsce/llm-wiki
    search: true

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
