<!-- Render ```mermaid fences on the Quarto site (docs/website.md documents this).
     GitHub renders these fences natively; Quarto's own {mermaid} cells only work in
     .qmd files, and this site renders plain .md in place. Pandoc emits the fence as
     <pre class="mermaid"><code>...</code></pre> with HTML-escaped entities, so each
     block is normalized to plain text before mermaid processes it. The mermaid
     library is only fetched on pages that contain at least one diagram. -->
<script type="module">
  const normalize = (pre) => {
    const clean = document.createElement("pre");
    clean.className = "mermaid";
    clean.textContent = pre.textContent;
    pre.replaceWith(clean);
    return clean;
  };
  const blocks = [
    ...document.querySelectorAll("pre.mermaid"),
    ...[...document.querySelectorAll("pre > code.mermaid")].map((c) => c.parentElement),
  ];
  if (blocks.length) {
    const { default: mermaid } = await import(
      "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs"
    );
    mermaid.initialize({ startOnLoad: false, theme: "neutral" });
    await mermaid.run({ nodes: [...new Set(blocks)].map(normalize) });
  }
</script>
