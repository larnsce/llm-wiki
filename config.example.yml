# llm-wiki configuration (example)
# Copy to <wiki_path>/llm-wiki.yml and adjust.
# Spec: openspec/specs/config.md (REQ-600..654)

# Required keys (REQ-610..613)
tool: logseq          # logseq or obsidian; no other values
wiki_path: ~/Documents/MyWiki/
pages_dir: pages      # relative to wiki_path; empty string for Obsidian

# Optional (REQ-620): L1 memory directory; absent means L1 features are off
memory_path: ~/.claude/projects/my-project/memory/

# Structural namespace names are lowercase, hyphen-only
# (specs/schema.md REQ-580/580a)
namespaces:
  - business
  - tech
  - content
  - projects
  - people
  - learning
  - reference

# Source pipeline (REQ-623): drop sources in raw/, ingest synthesises them
# into pages, then the file moves to ingested/<type>/. The move is the
# provenance record (in raw/ = pending, in ingested/ = processed).
# Remove these keys to disable the pipeline.
raw_dir: raw
ingested_dir: ingested
source_types:
  - papers
  - clippings
  - articles
  - data
  - notes
  - assets
  - transcripts
default_source_type: papers

# Source types whose archived bytes must not enter git history (REQ-624).
# Values must be a subset of source_types. transcripts is sensitive BY
# DEFAULT (ingest REQ-1301): AI-chat exports mix project detail, personal
# context, and half-formed ideas, so their bytes never belong in history -
# keep it listed. Add notes/data if promoted content can carry governed
# personal data:
sensitive_source_types:
  - transcripts
#   - notes
#   - data

# Human namespaces (optional; openspec/specs/config.md REQ-625,
# openspec/specs/namespaces.md REQ-980/981): para/ (PARA task layer) and
# notes/ (Zettelkasten), relative to the pages directory. The wiki toolchain
# never writes to them; the scope rule and namespace-hygiene lint recognize
# them. Defaults are para and notes and apply even when the keys are absent.
# Scaffold the layer on a fresh graph with init_wiki.py --with-para-notes
# (or setup.sh --init ... --with-para-notes); see docs/para-notes-workflow.md.
# para/ and notes/ are candidate sensitive_source_types entries (REQ-981):
# list them above if promoted content can carry governed personal data.
# para_dir: para
# notes_dir: notes

# Journal directory (optional; openspec/specs/config.md REQ-629): daily
# notes, relative to wiki_path. Logseq: the native journals/ directory,
# sibling of pages/. Obsidian: your daily-notes folder. Human-owned; the
# journal seam (specs/ingest.md REQ-090..095) appends the daily Ingested
# block there and never modifies existing journal content. Default applies
# even when the key is absent.
# journals_dir: journals

# Personal tier (optional; openspec/specs/config.md REQ-626): path to the
# archive.db capture database consumed by /wiki-ingest-voice (see
# openspec/specs/storage.md and docs/voice-pipeline.md). The default matches
# the voice-pipeline guide; the file is not required to exist (no file means
# an empty voice queue). Must live outside git or be gitignored (REQ-1103).
# archive_db: ~/archive/archive.db
# index_db (openspec/specs/config.md REQ-627): where rebuild_index.py writes
# the derived, disposable index database (storage REQ-1130..1133). Created on
# first rebuild; delete it any time, it rebuilds from the markdown.
# index_db: ~/archive/index.db

# Data-package seam (optional; openspec/specs/config.md REQ-660/661,
# specs/ingest.md REQ-100..106): registered R data packages, synced by
# scripts/data_pkg_sync.R / the /data-sync command into versioned
# ingested/data/<pkg>-<version>/ snapshots and wiki/data dataset pages.
# data_snapshots_keep bounds retention (a snapshot cited by any page is
# never deleted). Remove the keys to disable the seam.
# data_packages:
#   - owner/repo
# data_snapshots_keep: 3

# Glossary namespace (openspec/specs/config.md REQ-628, specs/glossary.md):
# human-decided EN-DE terminology; the tool scaffolds and structure-lints it
# (lint rule 15) and writes only rows confirmed at the /wiki-glossary
# checkpoint. Scaffold with init_wiki.py --with-glossary. Default applies
# even when the key is absent.
# glossary_dir: glossary
