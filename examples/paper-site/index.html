<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cbs-adoption — paper wiki</title>
<style>
:root{
  --bg:#f7f8f6; --ink:#20261f; --muted:#5d6660; --accent:#0e6b5a;
  --accent-soft:#0e6b5a22; --rule:#e2e6e1; --card:#eef1ec; --code-bg:#eaeee8;
  --serif:"Charter","Iowan Old Style",Georgia,"Times New Roman",serif;
  --sans:system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#161a18; --ink:#dbe1db; --muted:#8d968f; --accent:#53b89c;
    --accent-soft:#53b89c26; --rule:#2a302c; --card:#1d2320; --code-bg:#202622; }
}
:root[data-theme="dark"]{ --bg:#161a18; --ink:#dbe1db; --muted:#8d968f; --accent:#53b89c;
  --accent-soft:#53b89c26; --rule:#2a302c; --card:#1d2320; --code-bg:#202622; }
:root[data-theme="light"]{ --bg:#f7f8f6; --ink:#20261f; --muted:#5d6660; --accent:#0e6b5a;
  --accent-soft:#0e6b5a22; --rule:#e2e6e1; --card:#eef1ec; --code-bg:#eaeee8; }

*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--serif);
  font-size:1.0625rem;line-height:1.65}
header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--rule);
  font-family:var(--sans);font-size:.85rem;z-index:2}
.bar{max-width:46rem;margin:0 auto;padding:.6rem 1.25rem;display:flex;gap:1rem;
  align-items:baseline;flex-wrap:wrap}
.site{font-weight:650;letter-spacing:.02em;color:var(--ink);text-decoration:none}
.site span{color:var(--accent)}
nav{display:flex;gap:.9rem;flex-wrap:wrap}
nav a{color:var(--muted);text-decoration:none;padding-bottom:.1rem}
nav a:hover{color:var(--ink)}
nav a.active{color:var(--accent);border-bottom:2px solid var(--accent)}
.raw{margin-left:auto}
.raw a{color:var(--muted);text-decoration:none;font-family:var(--mono);font-size:.78rem;
  border:1px solid var(--rule);border-radius:3px;padding:.15rem .45rem}
.raw a:hover{color:var(--accent);border-color:var(--accent)}

main{max-width:46rem;margin:0 auto;padding:1.75rem 1.25rem 3rem}
.meta{display:flex;flex-wrap:wrap;gap:.4rem .6rem;margin:0 0 1.5rem;
  font-family:var(--sans);font-size:.74rem}
.meta span{background:var(--card);border:1px solid var(--rule);border-radius:3px;
  padding:.14rem .5rem;color:var(--muted)}
.meta b{color:var(--ink);font-weight:600;margin-left:.3rem}
.flavor{font-family:var(--sans);font-size:.74rem;color:var(--accent);
  letter-spacing:.06em;text-transform:uppercase;margin:0 0 .5rem}

h1,h2,h3,h4{font-family:var(--serif);line-height:1.25;text-wrap:balance}
h1{font-size:1.85rem;margin:.2rem 0 1rem;letter-spacing:-.01em}
h2{font-size:1.3rem;margin:2.2rem 0 .6rem;padding-top:1.1rem;border-top:1px solid var(--rule)}
h3{font-size:1.08rem;margin:1.6rem 0 .4rem}
p{margin:.75rem 0}
ul,ol{margin:.6rem 0;padding-left:1.4rem}
li{margin:.3rem 0}
li ul,li ol{margin:.25rem 0}
a{color:var(--accent);text-decoration:underline;text-decoration-thickness:1px;
  text-underline-offset:2px}
a.wl{text-decoration-style:dotted}
a.ext::after{content:"\2197";font-size:.75em;margin-left:.12em;color:var(--muted)}
strong{font-weight:650}
code{font-family:var(--mono);font-size:.86em;background:var(--code-bg);
  border-radius:3px;padding:.1em .32em}
pre{background:var(--code-bg);border:1px solid var(--rule);border-radius:4px;
  padding:.8rem 1rem;overflow-x:auto}
pre code{background:none;padding:0;font-size:.82rem;line-height:1.55}
blockquote{margin:1rem 0;padding:.2rem 1.1rem;border-left:3px solid var(--accent);
  background:var(--accent-soft);border-radius:0 4px 4px 0}
blockquote p{color:var(--ink)}
hr{border:0;border-top:1px solid var(--rule);margin:2rem 0}
.tblwrap{overflow-x:auto;margin:1rem 0}
table{border-collapse:collapse;font-family:var(--sans);font-size:.85rem;
  font-variant-numeric:tabular-nums;min-width:60%}
th,td{border:1px solid var(--rule);padding:.4rem .65rem;text-align:left;vertical-align:top}
th{background:var(--card);font-weight:600}
td[data-align="right"],th[data-align="right"]{text-align:right}
img{max-width:100%}

footer{border-top:1px solid var(--rule);font-family:var(--sans);font-size:.78rem;
  color:var(--muted)}
footer .bar{display:block;padding:1rem 1.25rem}
footer code{font-size:.9em}
.err h1{font-size:1.3rem}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<header>
  <div class="bar">
    <a class="site" href="#/index.md">cbs-adoption<span>&nbsp;/ paper wiki</span></a>
    <nav id="nav">
      <a href="#/index.md" data-path="index.md">Hub</a>
      <a href="#/about.md" data-path="about.md">About</a>
      <a href="#/agent-log.md" data-path="agent-log.md">AI log</a>
      <a href="#/pages/wiki___papers___cbs-adoption.md" data-path="pages/wiki___papers___cbs-adoption.md">Logseq twin</a>
    </nav>
    <div class="raw"><a id="rawlink" href="index.md" target="_blank" rel="noopener">raw .md</a></div>
  </div>
</header>
<main id="content" aria-live="polite"></main>
<footer>
  <div class="bar">Markdown-first: every page is a plain <code>.md</code> file served
  at the path shown in the URL after <code>#/</code> — humans read this rendering,
  agents fetch the identical file. Fixture site for
  <a href="https://github.com/larnsce/llm-wiki" class="ext" target="_blank" rel="noopener">llm-wiki</a> #145–#148.</div>
</footer>

<script>
'use strict';
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function inline(s){
  const codes=[];
  s=s.replace(/`([^`]+)`/g,(m,c)=>{codes.push(c);return '\u0000'+(codes.length-1)+'\u0000';});
  s=escapeHtml(s);
  s=s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g,'<img src="$2" alt="$1">');
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,(m,t,u)=>
    /^https?:/.test(u)
      ? '<a href="'+u+'" class="ext" target="_blank" rel="noopener">'+t+'</a>'
      : '<a href="'+u+'">'+t+'</a>');
  s=s.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,(m,target,label)=>{
    target=target.trim();
    const lab=label?label.trim():target.split('/').pop();
    return '<a class="wl" href="#/'+encodeURI(target)+'.md">'+lab+'</a>';
  });
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[\s(>])\*([^*\n]+)\*(?=[\s).,;:!?]|$)/g,'$1<em>$2</em>');
  s=s.replace(/\u0000(\d+)\u0000/g,(m,i)=>'<code>'+escapeHtml(codes[+i])+'</code>');
  return s;
}

function renderTable(rows){
  const cells=r=>r.replace(/^\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
  const align=cells(rows[1]).map(c=>/^-+:$/.test(c)?'right':/^:-+:$/.test(c)?'center':'left');
  let h='<div class="tblwrap"><table><thead><tr>';
  cells(rows[0]).forEach((c,i)=>h+='<th data-align="'+(align[i]||'left')+'">'+inline(c)+'</th>');
  h+='</tr></thead><tbody>';
  for(let r=2;r<rows.length;r++){
    h+='<tr>';
    cells(rows[r]).forEach((c,i)=>h+='<td data-align="'+(align[i]||'left')+'">'+inline(c)+'</td>');
    h+='</tr>';
  }
  return h+'</tbody></table></div>';
}

function renderList(items){ // items: {depth, text, ordered}
  let h='',depth=-1;
  const open=[];
  const closeTo=d=>{while(depth>d){h+='</li></'+open.pop()+'>';depth--;}};
  for(const it of items){
    if(it.depth>depth){
      while(depth<it.depth){const tag=it.ordered?'ol':'ul';h+='<'+tag+'><li>';open.push(tag);depth++;}
      h+=inline(it.text);
    }else{
      closeTo(it.depth);
      h+='</li><li>'+inline(it.text);
    }
  }
  closeTo(-1);
  return h;
}

function renderMarkdown(md){
  const lines=md.split('\n'); const out=[]; let i=0; let para=[];
  const flush=()=>{if(para.length){out.push('<p>'+inline(para.join(' '))+'</p>');para=[];}};
  while(i<lines.length){
    const line=lines[i];
    if(/^```/.test(line)){ flush();
      const buf=[]; i++;
      while(i<lines.length && !/^```/.test(lines[i])){buf.push(lines[i]);i++;}
      i++; out.push('<pre><code>'+escapeHtml(buf.join('\n'))+'</code></pre>'); continue; }
    if(/^\|/.test(line.trim()) && i+1<lines.length && /^\|?[\s:|-]+\|/.test(lines[i+1].trim())){
      flush(); const rows=[];
      while(i<lines.length && /^\|/.test(lines[i].trim())){rows.push(lines[i].trim());i++;}
      out.push(renderTable(rows)); continue; }
    const h=line.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const l=h[1].length;
      out.push('<h'+l+'>'+inline(h[2])+'</h'+l+'>'); i++; continue; }
    if(/^(-{3,}|\*{3,})\s*$/.test(line)){ flush(); out.push('<hr>'); i++; continue; }
    if(/^>\s?/.test(line)){ flush(); const buf=[];
      while(i<lines.length && /^>\s?/.test(lines[i])){buf.push(lines[i].replace(/^>\s?/,''));i++;}
      out.push('<blockquote><p>'+inline(buf.join(' '))+'</p></blockquote>'); continue; }
    const li=line.match(/^(\s*)([-*]|\d+\.)\s+(.*)$/);
    if(li){ flush(); const items=[];
      while(i<lines.length){
        const m=lines[i].match(/^(\s*)([-*]|\d+\.)\s+(.*)$/);
        if(!m)break;
        items.push({depth:Math.floor(m[1].replace(/\t/g,'  ').length/2),
                    text:m[3],ordered:/\d/.test(m[2])});
        i++;
      }
      out.push(renderList(items)); continue; }
    if(line.trim()===''){ flush(); i++; continue; }
    para.push(line.trim()); i++;
  }
  flush(); return out.join('\n');
}

function splitFront(md){
  if(md.startsWith('---\n')){
    const end=md.indexOf('\n---',4);
    if(end>0){
      const meta={};
      md.slice(4,end).split('\n').forEach(l=>{
        const m=l.match(/^([\w-]+):\s*(.*)$/); if(m)meta[m[1]]=m[2];});
      const rest=md.slice(end+4).replace(/^\n/,'');
      return {meta,body:rest,flavor:'obsidian'};
    }
  }
  const lines=md.split('\n'); const meta={}; let i=0;
  while(i<lines.length){
    const m=lines[i].match(/^([\w-]+)::\s*(.*)$/);
    if(m){meta[m[1]]=m[2];i++;}else break;
  }
  if(i>0){
    while(i<lines.length && lines[i].trim()==='')i++;
    return {meta,body:lines.slice(i).join('\n'),flavor:'logseq'};
  }
  return {meta:{},body:md,flavor:'obsidian'};
}

function logseqToFlat(body){
  const out=[];
  for(const line of body.split('\n')){
    const m=line.match(/^([\t ]*)-\s+(.*)$/);
    if(!m){ out.push(line.replace(/^[\t ]+/,'')); continue; }
    const depth=m[1].replace(/ {4}/g,'\t').replace(/[^\t]/g,'').length;
    const text=m[2];
    if(/^#{1,6}\s/.test(text)){ out.push('',text,''); }
    else if(/^\|/.test(text)){ out.push('',text); }
    else if(depth===0){ out.push('',text,''); }
    else { out.push('  '.repeat(depth-1)+'- '+text); }
  }
  return out.join('\n');
}

function renderMeta(meta,flavor){
  const keys=Object.keys(meta);
  let h='';
  if(flavor==='logseq')h+='<p class="flavor">Logseq flavor — rendered by the same viewer</p>';
  if(!keys.length)return h;
  h+='<div class="meta">';
  for(const k of keys)h+='<span>'+escapeHtml(k)+'<b>'+inline(meta[k])+'</b></span>';
  return h+'</div>';
}

const content=document.getElementById('content');
const rawlink=document.getElementById('rawlink');
let blobUrl=null;

async function route(){
  let path=decodeURIComponent(location.hash.replace(/^#\/?/,''))||'index.md';
  if(!/\.md$/.test(path))path+='.md';
  if(path.includes('..')){render404(path);return;}
  let text=null,fetched=false;
  try{
    const r=await fetch(path,{cache:'no-cache'});
    if(r.ok){text=await r.text();fetched=true;}
  }catch(e){}
  if(text===null){
    const el=document.querySelector('script[type="text/markdown"][data-path="'+path+'"]');
    if(el)text=el.textContent.replace(/^\n/,'');
  }
  if(text===null){render404(path);return;}
  const {meta,body,flavor}=splitFront(text);
  const flat=flavor==='logseq'?logseqToFlat(body):body;
  const html=renderMarkdown(flat);
  const h1=flat.match(/^#\s+(.*)$/m);
  document.title=(h1?h1[1].replace(/[*_`]/g,''):path)+' — cbs-adoption paper wiki';
  const titleHtml=html.replace(/(<h1>[\s\S]*?<\/h1>)/,
    '$1'+renderMeta(meta,flavor));
  content.innerHTML=/<h1>/.test(html)?titleHtml:renderMeta(meta,flavor)+html;
  if(blobUrl){URL.revokeObjectURL(blobUrl);blobUrl=null;}
  if(fetched){rawlink.href=path;}
  else{blobUrl=URL.createObjectURL(new Blob([text],{type:'text/plain'}));rawlink.href=blobUrl;}
  document.querySelectorAll('#nav a').forEach(a=>
    a.classList.toggle('active',a.dataset.path===path));
  window.scrollTo(0,0);
}

function render404(path){
  content.innerHTML='<div class="err"><h1>Not part of the published set</h1>'+
    '<p><code>'+escapeHtml(path)+'</code> is not in this site’s export. '+
    'Pages outside the paper’s public subgraph (private tiers, working notes) '+
    'are excluded by the export gate.</p>'+
    '<p><a href="#/index.md">Back to the paper hub</a></p></div>';
  document.title='Not found — cbs-adoption paper wiki';
}

window.addEventListener('hashchange',route);
route();
</script>
</body>
</html>
